<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>GeekOzon ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(to bottom, rgba(99,102,241,0.04) 0%, #ffffff 60%);
      color: #0f172a;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 12px; border-bottom: 1px solid #e5e7eb;
      margin-bottom: 12px;
    }
    .logo { width: 32px; height: 32px; border-radius: 8px; }
    .title-wrap h1 { font-size: 14px; font-weight: 700; }
    .title-wrap p { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .section { margin-bottom: 14px; }
    .section-title { font-size: 11px; color: #6b7280; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; font-size: 12px;
    }
    .status-row .label { color: #6b7280; }
    .status-row .value { font-weight: 600; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .badge-ok { background: rgba(0,176,80,0.1); color: #00b050; }
    .badge-warn { background: rgba(250,173,20,0.12); color: #faad14; }
    .badge-err { background: rgba(255,77,79,0.1); color: #ff4d4f; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .btn {
      padding: 9px 12px; border: 1px solid transparent; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: #6366f1; color: #fff; box-shadow: 0 1px 2px 0 rgba(15,23,42,0.06); }
    .btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 8px -2px rgba(99,102,241,0.28); transform: translateY(-1px); }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-block { width: 100%; }
    .shop-list { max-height: 160px; overflow-y: auto; }
    .shop-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 8px; border-radius: 6px; font-size: 12px; margin-bottom: 2px;
    }
    .shop-item:hover { background: #f3f4f6; }
    .shop-name { font-weight: 500; }
    .footer { padding-top: 10px; border-top: 1px solid #e5e7eb; font-size: 10px; color: #9ca3af; text-align: center; }
    .loading { text-align: center; padding: 20px; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../assets/icon-128.png" class="logo" alt="logo">
    <div class="title-wrap">
      <h1>GeekOzon ERP</h1>
      <p>v3.0.0 · 源码化重写版</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">连接状态</div>
    <div class="status-row"><span class="label">后端</span><span class="value" id="backendStatus">检测中...</span></div>
    <div class="status-row"><span class="label">seller.ozon.ru</span><span class="value" id="sellerTabStatus">检测中...</span></div>
    <div class="status-row"><span class="label">API 地址</span><span class="value" id="apiBaseUrl" style="font-size:11px;color:#6b7280">--</span></div>
  </div>

  <div class="section">
    <div class="section-title">店铺列表</div>
    <div class="shop-list" id="shopList"><div class="loading">加载中...</div></div>
  </div>

  <div class="section">
    <div class="section-title">快捷操作</div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btnCollect">采集当前页</button>
      <button class="btn btn-secondary" id="btnErp">打开 ERP</button>
      <button class="btn btn-secondary" id="btnSeller">打开 seller</button>
      <button class="btn btn-secondary" id="btnOptions">设置</button>
    </div>
  </div>

  <div class="footer">GeekOzon ERP · 源码化重写版 v3.0.0</div>

  <script src="../core/namespace.js"></script>
  <script src="../core/config.js"></script>
  <script src="../core/api-client.js"></script>
  <script src="../core/chrome-storage.js"></script>
  <script src="../core/cross-tab.js"></script>
  <script src="popup.js"></script>
</body>
</html>

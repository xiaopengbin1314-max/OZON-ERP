  <!-- Outfit 字体（TailAdmin 默认字体） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- ERP 原有样式（保留供 ERP 业务组件用） -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    /* TailAdmin @utility 自定义类（Play CDN 不支持 @utility，纯 CSS 实现） */
    .menu-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
    }
    .menu-item-active {
      background-color: #ecf3ff;
      color: #465fff;
    }
    .menu-item-inactive {
      color: #344054;
    }
    .menu-item-inactive:hover {
      background-color: #f2f4f7;
      color: #344054;
    }
    .menu-item-icon-active { fill: #465fff; }
    .menu-item-icon-inactive { fill: #667085; }
    .menu-item-arrow {
      position: absolute;
      top: 50%;
      right: 0.625rem;
      transform: translateY(-50%);
      transition: transform 0.2s;
    }
    .menu-item-arrow-active { transform: translateY(-50%) rotate(180deg); }
    .menu-dropdown {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .nav-parent.expanded .menu-dropdown { max-height: 500px; }
    .nav-parent.expanded > .menu-item .menu-item-arrow {
      transform: translateY(-50%) rotate(180deg);
    }
    .menu-dropdown-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-radius: 0.5rem;
      padding: 0.625rem 0.75rem;
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
    }
    .menu-dropdown-item-active { background-color: #ecf3ff; color: #465fff; }
    .menu-dropdown-item-inactive { color: #344054; }
    .menu-dropdown-item-inactive:hover { background-color: #f2f4f7; }

    /* ERP sidebar 折叠状态（保留 ERP JS 依赖） */
    .sidebar.collapsed { width: 68px !important; }
    .sidebar.collapsed .menu-text,
    .sidebar.collapsed .menu-item-arrow,
    .sidebar.collapsed .menu-dropdown,
    .sidebar.collapsed .menu-group-title { display: none !important; }
    .sidebar.collapsed .menu-item { justify-content: center; padding-left: 0; padding-right: 0; }
    .sidebar.collapsed .logo-text { display: none !important; }

    /* ERP 路由容器 */
    #pageContainer { min-height: calc(100vh - 80px); }
    body { font-family: 'Outfit', sans-serif; }

    /* ===== 覆盖 layout.css 中 sidebar 旧样式（旧版 position:fixed + .nav-item 旧样式，新版 flex + Tailwind） ===== */
    #sidebar {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      bottom: auto !important;
      width: 236px !important;
      height: 100vh !important;
      background: #ffffff !important;
      border-right: 1px solid #e4e7ec !important;
    }
    #sidebar.collapsed { width: 68px !important; }

    /* .nav-item 旧样式覆盖：让 .menu-item / .menu-dropdown-item 接管视觉 */
    #sidebar .nav-item {
      padding: 0.5rem 0.625rem !important;
      border-radius: 0.375rem !important;
      margin: 0 !important;
      width: auto !important;
      color: #344054 !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      letter-spacing: normal !important;
      background: transparent !important;
    }
    #sidebar .nav-item:hover {
      background: #f2f4f7 !important;
      color: #344054 !important;
    }
    #sidebar .nav-item.active {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
      font-weight: 600 !important;
    }
    /* 父级菜单按钮：不要 space-between，不要展开时加灰底 */
    #sidebar .nav-parent > .nav-item {
      justify-content: flex-start !important;
      gap: 0.75rem !important;
    }
    #sidebar .nav-parent.expanded > .nav-item {
      background: transparent !important;
    }
    /* 旧 .nav-icon 不影响新结构（新结构用 menu-item-icon） */
    #sidebar .nav-icon,
    #sidebar .menu-item-icon {
      margin-right: 0 !important;
      width: 20px !important;
      height: 20px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    /* 隐藏旧 nav-submenu 圆点伪元素 */
    #sidebar .nav-submenu .nav-item::before { display: none !important; }
    /* 旧 sidebar-header/sidebar-logo/sidebar-footer 不影响新结构 */
    #sidebar .sidebar-header,
    #sidebar .sidebar-logo,
    #sidebar .sidebar-footer { padding: 0 !important; border: 0 !important; margin: 0 !important; }
    /* collapsed 状态：隐藏文字、箭头、下拉、分组标题 */
    #sidebar.collapsed .menu-text,
    #sidebar.collapsed .menu-item-arrow,
    #sidebar.collapsed .menu-dropdown,
    #sidebar.collapsed .menu-group-title,
    #sidebar.collapsed .logo-text { display: none !important; }
    #sidebar.collapsed .nav-item { justify-content: center !important; padding: 0.5rem 0 !important; }

    #sidebar > div:first-child { padding: 15px 16px !important; }
    #sidebar .logo-text { display: flex; align-items: baseline; gap: 6px; line-height: 1; }
    #sidebar .logo-text small { color: #98a2b3; font-size: 10px; font-weight: 700; }
    #sidebar nav { padding: 12px 10px !important; gap: 2px !important; }
    #sidebar .menu-dropdown { padding-left: 28px !important; }
    #sidebar .nav-parent.expanded > .nav-item { color: #101828 !important; }

    /* ===== Sidebar v4：运营工作区 ===== */
    #sidebar {
      background: #fbfcfe !important;
      border-right-color: #dfe3ea !important;
      overflow: hidden !important;
    }
    #sidebar .sidebar-brand {
      min-height: 62px;
      flex: 0 0 62px;
      background: #ffffff;
      border-bottom: 1px solid #eaecf0 !important;
    }
    #sidebar .sidebar-brand > a { min-width: 0; }
    #sidebar .sidebar-brand > a > span:first-child {
      width: 30px !important;
      height: 30px !important;
      flex: 0 0 30px;
      border-radius: 6px !important;
      box-shadow: 0 1px 2px rgba(16, 24, 40, .12);
    }
    #sidebar nav {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #d0d5dd transparent;
    }
    #sidebar nav::-webkit-scrollbar { width: 4px; }
    #sidebar nav::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 4px; }
    #sidebar .sidebar-section-label {
      display: flex;
      align-items: center;
      min-height: 25px;
      margin: 10px 7px 3px;
      color: #98a2b3;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: .06em;
    }
    #sidebar .sidebar-section-label:first-child { margin-top: 0; }
    #sidebar .nav-item {
      min-height: 36px;
      position: relative;
      gap: 10px !important;
      color: #475467 !important;
    }
    #sidebar .nav-item:hover {
      background: #f2f4f7 !important;
      color: #1d2939 !important;
    }
    #sidebar .nav-item.active {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
    }
    #sidebar .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: #2563eb;
    }
    #sidebar .menu-item-icon,
    #sidebar .nav-item > svg {
      flex: 0 0 18px !important;
      width: 18px !important;
      height: 18px !important;
      color: #667085;
    }
    #sidebar .nav-item.active .menu-item-icon,
    #sidebar .nav-item.active > svg { color: #2563eb !important; }
    #sidebar .menu-item-arrow { right: 8px; color: #98a2b3; }
    #sidebar .menu-dropdown {
      margin: 2px 0 4px 17px;
      padding-left: 10px !important;
      border-left: 1px solid #e4e7ec;
    }
    #sidebar .menu-dropdown .nav-item {
      min-height: 32px;
      padding-top: 6px !important;
      padding-bottom: 6px !important;
      color: #667085 !important;
      font-size: 12px !important;
    }
    #sidebar .menu-dropdown .nav-item svg { width: 15px !important; height: 15px !important; }
    #sidebar .menu-dropdown .nav-item.active { color: #1d4ed8 !important; }
    #sidebar .nav-parent.expanded > .nav-item {
      background: #f2f4f7 !important;
      color: #1d2939 !important;
      font-weight: 600 !important;
    }
    #sidebar .sidebar-utility {
      flex: 0 0 auto;
      padding: 9px 10px 10px;
      background: #ffffff;
      border-top: 1px solid #eaecf0;
    }
    #sidebar .sidebar-store-status,
    #sidebar .sidebar-collapse-control {
      width: 100%;
      display: flex;
      align-items: center;
      border: 0;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
    }
    #sidebar .sidebar-store-status {
      min-height: 49px;
      gap: 9px;
      padding: 7px 8px;
      text-align: left;
    }
    #sidebar .sidebar-store-status:hover,
    #sidebar .sidebar-collapse-control:hover { background: #f2f4f7; }
    #sidebar .sidebar-store-icon {
      width: 30px;
      height: 30px;
      position: relative;
      flex: 0 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      color: #475467;
      background: #fff;
    }
    #sidebar .sidebar-store-icon > svg:first-child { width: 15px; height: 15px; }
    #sidebar .sidebar-store-check {
      position: absolute;
      right: -3px;
      bottom: -3px;
      width: 13px;
      height: 13px;
      padding: 2px;
      border: 2px solid #fff;
      border-radius: 50%;
      color: #fff;
      background: #12b76a;
    }
    #sidebar .sidebar-store-copy { min-width: 0; flex: 1; }
    #sidebar .sidebar-store-copy strong { display: block; color: #344054; font-size: 11px; line-height: 1.3; }
    #sidebar .sidebar-store-copy small { display: flex; align-items: center; gap: 5px; margin-top: 2px; color: #667085; font-size: 9px; }
    #sidebar .sidebar-store-copy small span { width: 5px; height: 5px; border-radius: 50%; background: #12b76a; }
    #sidebar .sidebar-store-arrow { width: 13px; height: 13px; color: #98a2b3; }
    #sidebar .sidebar-collapse-control {
      min-height: 32px;
      gap: 9px;
      margin-top: 3px;
      padding: 6px 9px;
      color: #667085;
      font-size: 10px;
      font-weight: 600;
    }
    #sidebar .sidebar-collapse-control svg { width: 15px; height: 15px; }
    #sidebar.collapsed .sidebar-brand { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
    #sidebar.collapsed .sidebar-section-label,
    #sidebar.collapsed .sidebar-store-copy,
    #sidebar.collapsed .sidebar-store-arrow,
    #sidebar.collapsed .sidebar-collapse-control span { display: none !important; }
    #sidebar.collapsed nav { padding-left: 9px !important; padding-right: 9px !important; }
    #sidebar.collapsed .nav-parent { margin-bottom: 2px; }
    #sidebar.collapsed .nav-item { width: 42px !important; min-height: 38px; margin-left: auto !important; margin-right: auto !important; }
    #sidebar.collapsed .nav-item.active::before { left: -9px; }
    #sidebar.collapsed .sidebar-utility { padding-left: 9px; padding-right: 9px; }
    #sidebar.collapsed .sidebar-store-status,
    #sidebar.collapsed .sidebar-collapse-control { width: 42px; justify-content: center; margin-left: auto; margin-right: auto; padding-left: 0; padding-right: 0; }
    #sidebar.collapsed .sidebar-collapse-control svg { transform: rotate(180deg); }

    /* ===== 主内容区（flex 子项，不需要 margin-left） ===== */
    .main-content {
      margin-left: 0 !important;
      margin-top: 0 !important;
      padding: 22px 24px 32px !important;
    }
    .sidebar ~ .main-content.collapsed-layout { margin-left: 0 !important; }

    @media (max-width: 1023px) {
      #sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        bottom: 0 !important;
        z-index: 60 !important;
        width: 236px !important;
        transform: translateX(-100%) !important;
        box-shadow: none !important;
      }
      #sidebar.mobile-open {
        transform: translateX(0) !important;
        box-shadow: 12px 0 32px rgba(16, 24, 40, 0.18) !important;
      }
      #mobileOverlay { display: none !important; }
      #sidebar.mobile-open + #mobileOverlay { display: block !important; }
      .main-content {
        width: 100% !important;
        padding: 18px 14px 28px !important;
      }
    }
  </style>
</head>
